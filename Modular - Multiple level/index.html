<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Mastery | Interactive Code Tutorial</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body class="antialiased h-screen flex flex-col overflow-hidden">

    <div id="level-selector" class="absolute inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center text-white p-6 transition-all duration-500">
        <div class="mb-10 text-center">
            <div class="bg-indigo-600/20 p-4 rounded-full inline-block mb-4 border border-indigo-500/30">
                <i class="fa-brands fa-python text-5xl text-indigo-400"></i>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight mb-2">Python Mastery</h1>
            <p class="text-slate-400">Select your proficiency level to begin the interactive sandbox.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl w-full">
            <button onclick="startLevel('Basics', basicsSteps)" class="bg-slate-800 border border-slate-700 p-8 rounded-2xl hover:bg-slate-700 hover:border-indigo-500 transition-all group text-left shadow-xl">
                <h2 class="text-2xl font-bold text-white mb-2 group-hover:text-indigo-400 transition-colors">1. Basics</h2>
                <p class="text-slate-400 text-sm mb-6 h-16">Variables, Lists, Functions, and basic loops. Perfect for starting your Python journey.</p>
                <div class="text-indigo-500 font-semibold text-sm flex items-center">Start Module <i class="fa-solid fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i></div>
            </button>

            <button onclick="startLevel('Intermediate', intermediateSteps)" class="bg-slate-800 border border-slate-700 p-8 rounded-2xl hover:bg-slate-700 hover:border-amber-500 transition-all group text-left shadow-xl">
                <h2 class="text-2xl font-bold text-white mb-2 group-hover:text-amber-400 transition-colors">2. Intermediate</h2>
                <p class="text-slate-400 text-sm mb-6 h-16">Dictionaries, Error Handling, Slicing, and Classes. Step up your scripting skills.</p>
                <div class="text-amber-500 font-semibold text-sm flex items-center">Start Module <i class="fa-solid fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i></div>
            </button>

            <button onclick="startLevel('Advanced', advancedSteps)" class="bg-slate-800 border border-slate-700 p-8 rounded-2xl hover:bg-slate-700 hover:border-rose-500 transition-all group text-left shadow-xl">
                <h2 class="text-2xl font-bold text-white mb-2 group-hover:text-rose-400 transition-colors">3. Advanced</h2>
                <p class="text-slate-400 text-sm mb-6 h-16">List Comprehensions, Async/Await, Decorators, and Pattern Matching for Architects.</p>
                <div class="text-rose-500 font-semibold text-sm flex items-center">Start Module <i class="fa-solid fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i></div>
            </button>
        </div>
    </div>

    <div id="app-container" class="hidden flex-col h-full w-full">
        <header class="bg-slate-800 border-b border-slate-700 py-3 px-6 flex justify-between items-center z-10 text-white shadow-md">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 p-2 rounded-lg flex items-center justify-center h-9 w-9">
                    <i class="fa-brands fa-python text-xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight">Python Workspace</h1>
                    <p id="level-title" class="text-xs text-slate-400">Syntax & Patterns Sandbox</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-6">
                <button onclick="location.reload()" class="text-xs text-slate-400 hover:text-white transition-colors mr-2">
                    <i class="fa-solid fa-house mr-1"></i> Main Menu
                </button>
                <button id="theme-toggle" onclick="toggleTheme()" class="p-2 rounded-full hover:bg-slate-700 transition-colors text-slate-300" title="Toggle Light/Dark Mode">
                    <i id="theme-icon" class="fa-solid fa-moon text-lg"></i>
                </button>
                
                <div class="flex items-center space-x-3">
                    <span class="text-xs font-semibold uppercase text-slate-400 tracking-wider">Course Progress</span>
                    <div class="w-48 h-2 bg-slate-700 rounded-full overflow-hidden border border-slate-600">
                        <div id="progressBar" class="h-full bg-indigo-500 transition-all duration-700 ease-out" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <aside class="w-72 sidebar-bg border-r flex flex-col h-full z-10">
                <div class="p-4 border-b border-slate-800/20">
                    <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Course Curriculum</h3>
                </div>
                <nav class="flex-1 overflow-y-auto p-3 space-y-2" id="sidebar-nav"></nav>
                <div class="p-4 border-t border-slate-800/20 text-[10px] text-slate-500 text-center uppercase tracking-widest">
                    v2026.1.0 Ready
                </div>
            </aside>

            <main class="flex-1 flex flex-col overflow-hidden relative">
                <div id="workspace-content" class="flex-1 p-8 overflow-y-auto"></div>

                <div id="action-panel" class="bg-slate-800/10 border-t border-slate-800/20 p-5 flex items-center justify-between z-10 backdrop-blur-md hidden">
                    <div class="flex items-center space-x-3">
                        <button onclick="showSolution()" class="px-4 py-2 border border-slate-500/50 rounded-lg hover:bg-indigo-500/10 transition-all text-sm font-medium flex items-center">
                            <i class="fa-solid fa-lightbulb mr-2 text-amber-400"></i> Show Solution
                        </button>
                        <span id="feedback-msg" class="text-sm font-medium transition-all duration-300 opacity-0"></span>
                    </div>

                    <div class="flex items-center space-x-3">
                        <button id="btn-submit" onclick="submitStep()" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg font-semibold shadow-lg shadow-indigo-500/20 transition-all text-sm flex items-center">
                            <i class="fa-solid fa-check-double mr-2"></i> Submit Answer
                        </button>
                        <button id="btn-next" onclick="nextStep()" disabled class="px-6 py-2 bg-slate-400/20 text-slate-500 rounded-lg font-semibold transition-all text-sm flex items-center">
                            Next Level <i class="fa-solid fa-arrow-right ml-2"></i>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="ScriptPythonBasics.js"></script>
    <script src="ScriptPythonIntermediate.js"></script>
    <script src="ScriptPythonAdvanced.js"></script>
    
    <script src="AppLogic.js"></script>
</body>
</html>
